<script>
        function toggleSwitch(el) {
            const thumb = el.querySelector('.switch-thumb');
            if (el.classList.contains('switch-on')) {
                el.classList.remove('switch-on');
                el.classList.add('bg-white/20');
                thumb.style.transform = 'translateX(0)';
            } else {
                el.classList.add('switch-on');
                el.classList.remove('bg-white/20');
                thumb.style.transform = 'translateX(24px)';
            }
        }

        // Horizontal Scroll Interaction
        const scrollContainer = document.querySelector('.overflow-x-auto');
        let isDown = false;
        let startX;
        let scrollLeft;

        scrollContainer.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - scrollContainer.offsetLeft;
            scrollLeft = scrollContainer.scrollLeft;
        });
        scrollContainer.addEventListener('mouseleave', () => {
            isDown = false;
        });
        scrollContainer.addEventListener('mouseup', () => {
            isDown = false;
        });
        scrollContainer.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - scrollContainer.offsetLeft;
            const walk = (x - startX) * 2;
            scrollContainer.scrollLeft = scrollLeft - walk;
        });
    </script>
