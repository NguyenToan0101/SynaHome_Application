name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Decode keystore
        if: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      - name: Write key properties
        if: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
      - run: flutter build appbundle --release --flavor production --target lib/main_production.dart --dart-define API_BASE_URL=${{ secrets.PRODUCTION_API_BASE_URL }}
