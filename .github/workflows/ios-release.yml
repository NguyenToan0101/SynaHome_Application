name: iOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign --flavor production --target lib/main_production.dart --dart-define API_BASE_URL=${{ secrets.PRODUCTION_API_BASE_URL }}
