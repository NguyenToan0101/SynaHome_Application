<script>
        // Micro-interaction for Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeThumb = themeToggle.querySelector('div');
        let isDarkMode = false;

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                themeThumb.style.transform = 'translateX(20px)';
                themeToggle.classList.replace('bg-surface-container-highest', 'bg-secondary');
                document.documentElement.classList.add('dark');
            } else {
                themeThumb.style.transform = 'translateX(0px)';
                themeToggle.classList.replace('bg-secondary', 'bg-surface-container-highest');
                document.documentElement.classList.remove('dark');
            }
        });

        // Add haptic-like feel to buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
