<!-- Custom Micro-interaction Script -->
<script>
        // Simple loading bar animation logic
        const keyframes = `
            @keyframes loading {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(300%); }
            }
        `;
        const styleSheet = document.createElement("style");
        styleSheet.innerText = keyframes;
        document.head.appendChild(styleSheet);

        // Interaction: Subtle parallax on mouse move (Desktop Only)
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                const logo = document.querySelector('.animate-float');
                if(logo) {
                    logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            }
        });

        // Trigger transition out after delay (Simulating app load)
