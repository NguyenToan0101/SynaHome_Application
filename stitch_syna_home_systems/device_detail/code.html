<script>
    let currentTemp = 68;
    const ring = document.getElementById('temp-ring');
    const display = document.getElementById('temp-display');
    const handle = document.getElementById('dial-handle');
    
    // SVG Circle perimeter calculation (2 * PI * R) = 282.7
    // We want a range of roughly 60 to 85 degrees
    const minTemp = 60;
    const maxTemp = 85;

    function updateTemp(change) {
      const newTemp = currentTemp + change;
      if (newTemp >= minTemp && newTemp <= maxTemp) {
        currentTemp = newTemp;
        updateUI();
      }
    }

    function updateUI() {
      display.innerText = currentTemp;
      
      // Calculate percentage of temperature range
      const percent = (currentTemp - minTemp) / (maxTemp - minTemp);
      
      // Update SVG ring (stroke-dashoffset from 282.7 to 0)
      // We only show a portion of the ring for a "dial" effect
      const offset = 282.7 - (percent * 282.7);
      ring.style.strokeDashoffset = offset;
      
      // Rotate the handle icon based on the percentage
      // Assuming it rotates from roughly -120deg to 120deg
      const rotation = (percent * 240) - 120;
      handle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
    }

    // Initialize UI
    updateUI();

    // Subtle Fan Button Interaction
    const fanButtons = document.querySelectorAll('section:nth-of-type(3) button');
    fanButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        fanButtons.forEach(b => {
          b.classList.remove('bg-primary', 'text-white');
          b.classList.add('bg-surface-container', 'text-on-surface-variant');
        });
        btn.classList.add('bg-primary', 'text-white');
        btn.classList.remove('bg-surface-container', 'text-on-surface-variant');
      });
    });
  </script>
