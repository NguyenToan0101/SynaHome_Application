<!DOCTYPE html>

                        "primary-fixed": "#d8e2ff",

                        "surface-tint": "#005bc1",

                        "secondary-fixed-dim": "#53e16f",

                        "secondary-fixed": "#72fe88",

                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#004493",
                        "on-surface-variant": "#414755",

                    "spacing": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md px-container-margin z-10">
<!-- Identity / Logo -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-[28px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-center">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Control your environment with ease</p>
</div>
<!-- Card Wrapper -->
<div class="glass-card rounded-2xl p-lg shadow-[0px_4px_24px_rgba(0,0,0,0.04)] border border-white/40">
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs uppercase" for="email">Email Address</label>
<div class="relative group input-focus-ring rounded-2xl transition-all border border-outline-variant/30 bg-surface-container-lowest focus-within:border-primary/50 overflow-hidden">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-transparent border-none py-md pl-[48px] pr-md text-on-surface placeholder:text-on-surface-variant/40 font-body-md focus:ring-0" id="email" name="email" placeholder="name@lumina.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group input-focus-ring rounded-2xl transition-all border border-outline-variant/30 bg-surface-container-lowest focus-within:border-primary/50 overflow-hidden">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-transparent border-none py-md pl-[48px] pr-md text-on-surface placeholder:text-on-surface-variant/40 font-body-md focus:ring-0" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-headline-md text-[17px] py-md rounded-2xl shadow-[0px_8px_20px_rgba(0,88,188,0.25)] hover:shadow-[0px_12px_24px_rgba(0,88,188,0.35)] active:scale-[0.98] transition-all duration-200 mt-md" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="flex items-center gap-md py-md">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant/40">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Biometric / FaceID Option -->
<button class="w-full flex items-center justify-center gap-sm bg-white border border-outline-variant/20 py-md rounded-2xl hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200" type="button">
<span class="material-symbols-outlined text-primary text-[24px]">face</span>
<span class="font-label-sm text-label-sm text-on-surface">Sign in with FaceID</span>
</button>
</form>
</div>
<!-- Footer Links -->
<p class="text-center mt-xl font-body-md text-body-md text-on-surface-variant">
            New to Lumina? 
            <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4" href="#">Create an account</a>
</p>
</main>
<!-- Support Link -->
<div class="fixed bottom-lg left-0 w-full flex justify-center z-10">
<a class="flex items-center gap-xs font-label-sm text-label-sm text-on-surface-variant/60 hover:text-on-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
            Need assistance?
        </a>
</div>
<!-- Decorative Illustration (Visible on Desktop) -->
<div class="hidden lg:block absolute right-0 top-0 h-full w-1/3 overflow-hidden">
<div class="h-full w-full opacity-60 mix-blend-multiply bg-surface-container-high relative">
<!-- Simulated background content using a placeholder that matches the smart home aesthetic -->
<div class="absolute inset-0 bg-cover bg-center grayscale" data-alt="A high-end minimal smart home interior featuring clean architectural lines, a large window looking out onto a misty morning, and soft directional light hitting a designer sofa. The aesthetic is extremely clean and high-end, utilizing a monochromatic palette with subtle warm accents. The image conveys a sense of serene, technologically integrated luxury living." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCM12KglfHxFG189Q906HJoXGZ6-sUJMo6VU9EpYzuNUe89bDBRySrImoTKFVGtp2YrD8sUhPcxKFM1ZxJLvQQ2RzmfQbmSKNQKUb5pf-7ik9yZXGKxJAjGYw2cM5NK3sxWZGYGb5-SSCwevs_70modNz6dtFpU0sYGkK9FTBTCpD74Ud-mqlFJ2zYEGB2kYxIbZ1uCJakLjfNMFjMV9-10clQtMoTErJ02jvTlAHrM_f8g97PDsuC3_Frb0egmn7P9_sCkZ-w6jAs')"></div>
<div class="absolute inset-0 bg-gradient-to-l from-transparent to-background"></div>
</div>
</div>
<script>
        // Micro-interactions
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('mousedown', () => {
                if (el.classList.contains('active:scale-[0.98]')) return;
                el.style.transform = 'scale(0.98)';
            });
            el.addEventListener('mouseup', () => {
                el.style.transform = 'scale(1)';
            });
            el.addEventListener('mouseleave', () => {
                el.style.transform = 'scale(1)';
            });
        });

        // Toggle Password Visibility Logic
        const passToggle = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        // Simple logic for the demo
        let isVisible = false;
        document.querySelector('button[type="button"] .material-symbols-outlined:contains("visibility")')?.parentElement.addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            isVisible = !isVisible;
            input.type = isVisible ? 'text' : 'password';
            icon.textContent = isVisible ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
